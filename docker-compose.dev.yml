services:
  agent:
    image: ghcr.io/${GITHUB_OWNER:-long-safe-accont-4567-uvwxyz-9876}/xiaoda-agent:latest
    container_name: xiaoda-agent
    ports:
      - "${WEBUI_PORT:-8082}:${WEBUI_PORT:-8082}"
    volumes:
      # 代码挂载：本地代码覆盖容器内代码，更新只需 git pull + restart
      # 注意：需要先在本地构建前端 (cd web/frontend && npm ci && npm run build)
      - ./:/app
      # 数据独立持久化，升级不丢配置
      - agent-data:/data
    environment:
      - KIOXIA_DATA_DIR=/data
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=${WEBUI_PORT:-8082}
      - AGENTLY_CLI_HOME=/data/agently-cli
    env_file:
      - .env
    restart: unless-stopped
    # 安全加固（dev 模式部分启用）
    # cap_drop: 丢弃所有非必要 Linux capabilities
    # security_opt: 阻止子进程通过 setuid/setgid 提权
    # 注意：dev 模式因代码挂载 ./:/app 需要可写，**不启用** read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1.5G

volumes:
  agent-data:
