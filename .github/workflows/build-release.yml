name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        default: '0.3.30'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64
            artifact: xiaoda-agent-windows-x64
          - runner: ubuntu-latest
            platform: linux-x86_64
            artifact: xiaoda-agent-linux-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure assets are present
        shell: bash
        run: |
          # assets 文件应在 checkout 时已检出，这里做安全检查
          echo "=== Ensure assets are present ==="
          if [ -d "assets" ]; then
            count=$(find assets/ -type f | wc -l)
            echo "assets/ 文件数: $count"
          else
            echo "ERROR: assets/ 目录不存在"
            exit 1
          fi
          # 只需确认 icon 文件存在（sticker/voice 已从安装包移除）
          ls -la assets/xiaoda-icon.* 2>/dev/null || { echo "ERROR: xiaoda-icon not found"; exit 1; }
          echo "Assets present OK"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean old frontend dist
        shell: bash
        run: |
          [ -d web/dist ] && rm -rf web/dist || true
          # 清理 PyInstaller 构建缓存，确保全量重建（--clean 只清理 build/ 不清理 dist/）
          rm -rf build/ dist/ 2>/dev/null || true
          # 确保 .env 和敏感文件不被打包进安装包
          rm -f .env .env.prod .env.local 2>/dev/null || true
          rm -f config/webui_overrides.json 2>/dev/null || true
          rm -rf credentials/ 2>/dev/null || true
          find . -name "*.key" -not -path "./.git/*" -delete 2>/dev/null || true

      - name: Install frontend deps
        working-directory: web/frontend
        run: npm install

      - name: Build frontend (vite)
        working-directory: web/frontend
        run: npm run build

      - name: Verify frontend build
        shell: bash
        run: |
          echo "=== web/dist contents ==="
          ls -la web/dist/
          echo "=== web/dist/assets ==="
          ls web/dist/assets/ | head -40
          # Verify key files exist
          test -f web/dist/index.html || (echo "ERROR: index.html not found!" && exit 1)
          # Verify wallpapers exist (check for any .jpg files in wallpapers directory)
          WALLPAPER_COUNT=$(find web/dist/assets/wallpapers -name "*.jpg" 2>/dev/null | wc -l)
          if [ "$WALLPAPER_COUNT" -lt 4 ]; then
            echo "ERROR: Expected at least 4 wallpapers, found $WALLPAPER_COUNT"
            echo "Available wallpapers:"
            ls -la web/dist/assets/wallpapers/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          echo "Found $WALLPAPER_COUNT wallpapers - OK"
          # Verify /setup route is included in built JS
          FOUND=0
          for f in web/dist/assets/*.js; do
            if grep -q '"setup"' "$f" 2>/dev/null; then
              FOUND=1
              echo "/setup route found in: $(basename $f) - OK"
              break
            fi
          done
          if ls web/dist/assets/SetupWizardView-*.js 2>/dev/null | grep -q .; then
            FOUND=1
            echo "SetupWizardView chunk found - OK"
          fi
          if [ $FOUND -eq 0 ]; then
            echo "FATAL: /setup route or SetupWizardView chunk NOT found in built dist!"
            echo "This means the setup page will be blank. Build aborted."
            exit 1
          fi
          echo "Frontend build verified OK"

      - name: Create media directories
        shell: bash
        run: |
          mkdir -p web/media/stickers
          touch web/media/stickers/.gitkeep

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install fastapi uvicorn[standard] websockets python-multipart sse-starlette httpx Pillow numpy rich python-dotenv loguru openai aiosqlite pydantic jieba pyyaml pilk pywebview

      - name: Verify pilk installed (SILK codec for voice messages)
        shell: python
        run: |
          try:
              import pilk
              print(f"pilk version: {pilk.__version__}")
              print("pilk OK - voice messages will work")
          except ImportError:
              print("FATAL: pilk not installed! Voice messages will fail.")
              raise SystemExit(1)

      - name: Verify assets before build
        shell: bash
        run: |
          echo "=== assets/ directory ==="
          if [ -d assets/ ]; then
            FILE_COUNT=$(find assets/ -type f | wc -l)
            echo "File count: $FILE_COUNT"
            du -sh assets/ 2>/dev/null || echo "empty"
            find assets/ -type f | head -10
          else
            echo "WARNING: assets/ directory not found"
          fi
          echo "=== xiaoda-icon exists ==="
          ls -la assets/xiaoda-icon.* 2>/dev/null || echo "WARNING: xiaoda-icon not found"

      - name: Sanitize developer PII from config
        shell: bash
        run: |
          # Remove developer personal info from workspace templates before bundling
          # 支持 .md 和 .tpl 扩展名
          for f in config/workspace/USER.md config/workspace/SOUL.md config/workspace/USER.md.tpl config/workspace/SOUL.md.tpl; do
            if [ -f "$f" ]; then
              sed -i 's/刘润飞/（用户姓名）/g' "$f"
            fi
          done
          echo "Sanitized developer PII from config/workspace/"

      - name: Build with PyInstaller
        run: pyinstaller xiaoda-agent.spec --clean --noconfirm
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8

      - name: Verify pilk C extension bundled (voice messages)
        shell: bash
        run: |
          echo "=== Checking pilk C extension in build output ==="
          PILK_FOUND=0
          # Windows: _pilk.cp311-win_amd64.pyd
          # Linux: _pilk.cpython-311-*.so
          if find dist/xiaoda-agent -name "_pilk*" -print -quit 2>/dev/null | grep -q .; then
            echo "OK: pilk C extension found:"
            find dist/xiaoda-agent -name "_pilk*" -exec ls -lh {} \;
            PILK_FOUND=1
          fi
          if [ $PILK_FOUND -eq 0 ]; then
            echo "FATAL: pilk C extension (_pilk.so/.pyd) not found in build output!"
            echo "Voice messages will fail with '缺少 SILK 编码库' error."
            exit 1
          fi
          echo "pilk C extension verified OK"

      - name: Verify Pillow C extension bundled (image compression)
        shell: bash
        run: |
          echo "=== Checking Pillow C extension in build output ==="
          PIL_FOUND=0
          # Windows: _imaging.cp311-win_amd64.pyd
          # Linux: _imaging.cpython-311-*.so
          if find dist/xiaoda-agent -name "_imaging*" -print -quit 2>/dev/null | grep -q .; then
            echo "OK: Pillow _imaging C extension found:"
            find dist/xiaoda-agent -name "_imaging*" -exec ls -lh {} \;
            PIL_FOUND=1
          fi
          if [ $PIL_FOUND -eq 0 ]; then
            echo "FATAL: Pillow _imaging C extension not found in build output!"
            echo "Image compression for QQ image sending will fail."
            exit 1
          fi
          echo "Pillow C extension verified OK"

      - name: Ensure assets bundled in dist
        shell: bash
        run: |
          # PyInstaller 的 datas 可能未正确打包 assets，手动复制确保资源存在
          # 只复制图标文件（语音和表情包已从安装包中移除）
          cp assets/xiaoda-icon.* dist/xiaoda-agent/assets/ 2>/dev/null || true
          echo "Assets bundled OK: $(find dist/xiaoda-agent/assets -type f 2>/dev/null | wc -l) files"

      - name: Verify assets in build output
        shell: bash
        run: |
          echo "=== dist/xiaoda-agent/ top-level ==="
          ls -la dist/xiaoda-agent/ 2>/dev/null | head -20 || { echo "ERROR: dist/xiaoda-agent/ not found"; exit 1; }
          echo ""
          echo "=== dist/xiaoda-agent/assets/ (icon etc.) ==="
          if [ -d dist/xiaoda-agent/assets ]; then
            find dist/xiaoda-agent/assets/ -type f 2>/dev/null | head -10
          else
            echo "No dist/xiaoda-agent/assets/ directory"
          fi
          echo ""
          echo "=== dist/xiaoda-agent/web/dist/assets/ (wallpapers etc.) ==="
          if [ -d dist/xiaoda-agent/web/dist/assets ]; then
            WEB_ASSETS_COUNT=$(find dist/xiaoda-agent/web/dist/assets/ -type f 2>/dev/null | wc -l)
            echo "Frontend assets: $WEB_ASSETS_COUNT files"
            find dist/xiaoda-agent/web/dist/assets/ -type f 2>/dev/null | head -15
          else
            echo "ERROR: No frontend assets found in dist/xiaoda-agent/web/dist/assets/"
            exit 1
          fi

      - name: Strip secrets from build output
        shell: bash
        run: |
          # 强制删除构建产物中的敏感文件（双重保险）
          find dist/xiaoda-agent -name ".env" -not -name ".env.example" -delete 2>/dev/null || true
          find dist/xiaoda-agent -name "webui_overrides.json" -delete 2>/dev/null || true
          find dist/xiaoda-agent -name "*.key" -delete 2>/dev/null || true
          find dist/xiaoda-agent -type d -name "credentials" -exec rm -rf {} + 2>/dev/null || true
          echo "Stripped secrets from build output"

      - name: Verify no secrets in build
        shell: bash
        run: |
          echo "=== Scanning for leaked secrets ==="
          FOUND=0
          # Check for .env files (not .env.example)
          if find dist/xiaoda-agent -name ".env" -not -name ".env.example" -print -quit 2>/dev/null | grep -q .; then
            echo "FOUND: .env file"; FOUND=1
          fi
          # Check for .key files
          if find dist/xiaoda-agent -name "*.key" -print -quit 2>/dev/null | grep -q .; then
            echo "FOUND: .key file"; FOUND=1
          fi
          # Check for credentials directory
          if find dist/xiaoda-agent -type d -name "credentials" -print -quit 2>/dev/null | grep -q .; then
            echo "FOUND: credentials dir"; FOUND=1
          fi
          # Check for webui_overrides.json
          if find dist/xiaoda-agent -name "webui_overrides.json" -print -quit 2>/dev/null | grep -q .; then
            echo "FOUND: webui_overrides.json"; FOUND=1
          fi
          # Check for real API key patterns (sk- followed by 20+ chars, not in .env.example)
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" dist/xiaoda-agent/ --include="*.json" --include="*.env" --include="*.key" -l 2>/dev/null | grep -v ".env.example" | grep -q .; then
            echo "FOUND: API key pattern"; FOUND=1
          fi
          # === 新增：开发者个人信息扫描 ===
          # Check for Chinese name (developer PII)
          if grep -rI "刘润飞" dist/xiaoda-agent/ 2>/dev/null; then
            echo "❌ 发现敏感信息：中文姓名"
            exit 1
          fi
          # Check for GitHub username (developer PII)
          if grep -rI "liu-runfei" dist/xiaoda-agent/ 2>/dev/null; then
            echo "❌ 发现敏感信息：GitHub 用户名"
            exit 1
          fi
          # Check for local absolute paths (developer PII)
          if grep -rI "/home/orangepi" dist/xiaoda-agent/ 2>/dev/null; then
            echo "❌ 发现敏感信息：本地路径 /home/orangepi"
            exit 1
          fi
          if grep -rI "/media/orangepi" dist/xiaoda-agent/ 2>/dev/null; then
            echo "❌ 发现敏感信息：本地路径 /media/orangepi"
            exit 1
          fi
          # Check for workspace personal files that should be excluded
          for f in USER.md SOUL.md IDENTITY.md MEMORY.md; do
            if find dist/xiaoda-agent -name "$f" -not -path "*/node_modules/*" | grep -q .; then
              echo "❌ 发现应被排除的文件：$f"
              exit 1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "ERROR: Leaked secrets found in build!"
            exit 1
          fi
          echo "No secrets found - OK"

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # main branch push — read from pyproject.toml (pure bash, no Python dependency)
            VERSION=$(grep -m1 '^version\s*=' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package (Windows - NSIS Installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $ErrorActionPreference = "Continue"

          Set-Content -Path "dist/xiaoda-agent/.version" -Value $version -NoNewline
          New-Item -Path "dist/xiaoda-agent/.auto_update" -ItemType File -Force
          Copy-Item "scripts/start-windows.bat" "dist/xiaoda-agent/"
          Copy-Item "scripts/auto-update.bat" "dist/xiaoda-agent/"
          Copy-Item "scripts/open-browser.ps1" "dist/xiaoda-agent/"
          Copy-Item "assets/xiaoda-icon.ico" "dist/xiaoda-agent/xiaoda-icon.ico"

          choco install nsis -y --no-progress
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsisPath)) {
            $nsisPath = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          }

          if ($nsisPath -and (Test-Path $nsisPath)) {
            Write-Host "NSIS found at: $nsisPath"
            $nsi = Get-Content "scripts/installer.nsi" -Raw
            $nsi = $nsi -replace '\$\{VERSION\}', $version
            [System.IO.File]::WriteAllText("$PWD\installer.nsi", $nsi, [System.Text.UTF8Encoding]::new($true))

            Write-Host "Running NSIS build..."
            & $nsisPath installer.nsi
            if ($LASTEXITCODE -ne 0) {
              Write-Host "NSIS build failed, falling back to ZIP..."
              Compress-Archive -Path "dist\xiaoda-agent" -DestinationPath "xiaoda-agent-windows-x64-v${version}.zip"
            } else {
              $installerPath = "xiaoda-agent-windows-x64-v${version}-setup.exe"
              if (Test-Path $installerPath) {
                Write-Host "Installer created: $installerPath ($([math]::Round((Get-Item $installerPath).Length / 1MB, 1)) MB)"
              } else {
                Write-Host "Installer not found, falling back to ZIP..."
                Compress-Archive -Path "dist\xiaoda-agent" -DestinationPath "xiaoda-agent-windows-x64-v${version}.zip"
              }
            }
          } else {
            Write-Host "NSIS not found, creating ZIP..."
            Compress-Archive -Path "dist\xiaoda-agent" -DestinationPath "xiaoda-agent-windows-x64-v${version}.zip"
          }

          # Create tar.gz for auto-update (Windows 10 1803+ includes tar)
          Write-Host "Creating tar.gz for auto-update..."
          tar -czf "xiaoda-agent-windows-x64-v${version}.tar.gz" -C dist xiaoda-agent

      - name: Package (Linux x86_64)
        if: matrix.platform == 'linux-x86_64'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo -n "$VERSION" > dist/xiaoda-agent/.version
          touch dist/xiaoda-agent/.auto_update
          mkdir -p dist/xiaoda-agent/scripts
          cp scripts/auto-update.sh dist/xiaoda-agent/scripts/
          chmod +x dist/xiaoda-agent/scripts/auto-update.sh
          tar -czf xiaoda-agent-linux-x86_64-v${VERSION}.tar.gz -C dist xiaoda-agent

          # 打包 Linux 安装脚本
          cp scripts/install-linux.sh xiaoda-agent-linux-x86_64-v${VERSION}-install.sh
          chmod +x xiaoda-agent-linux-x86_64-v${VERSION}-install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            xiaoda-agent-windows-x64-*-setup.exe
            xiaoda-agent-windows-x64-*.zip
            xiaoda-agent-windows-x64-*.tar.gz
            xiaoda-agent-linux-x86_64-*.tar.gz
            xiaoda-agent-linux-x86_64-*-install.sh
          if-no-files-found: warn

  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep -m1 '^version\s*=' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/xiaoda-agent:latest
            ghcr.io/${{ github.repository_owner }}/xiaoda-agent:v${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=Xiaoda Agent
            org.opencontainers.image.version=v${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio pytest-timeout numpy
      - run: python -m pytest tests/ -x -q --timeout=60

  release:
    needs: [build, test]
    # Only create release on tag push or manual dispatch, NOT on main branch push
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd artifacts
          for f in xiaoda-agent-*.tar.gz xiaoda-agent-*.zip xiaoda-agent-*-setup.exe xiaoda-agent-*-install.sh; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
          done
          echo "--- SHA256 checksums ---"
          cat *.sha256

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep -m1 '^version\s*=' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          files: |
            artifacts/xiaoda-agent-windows-x64-*-setup.exe
            artifacts/xiaoda-agent-windows-x64-*.zip
            artifacts/xiaoda-agent-windows-x64-*.tar.gz
            artifacts/xiaoda-agent-linux-x86_64-*.tar.gz
            artifacts/xiaoda-agent-linux-x86_64-*-install.sh
            artifacts/*.sha256
