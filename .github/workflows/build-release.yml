name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64
            artifact: nahida-agent-windows-x64
          - runner: ubuntu-latest
            platform: linux-x86_64
            artifact: nahida-agent-linux-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt || true
          # Ensure core deps are installed even if optional ones fail
          pip install fastapi uvicorn[standard] websockets python-multipart sse-starlette httpx Pillow numpy rich python-dotenv loguru openai aiosqlite pydantic jieba pyyaml

      - name: Build with PyInstaller
        run: pyinstaller nahida-agent.spec --clean --noconfirm

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package (Windows - NSIS Installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # Create version file and auto-update flag
          Set-Content -Path "dist/nahida-agent/.version" -Value $version -NoNewline
          New-Item -Path "dist/nahida-agent/.auto_update" -ItemType File -Force
          # Copy auto-update scripts
          Copy-Item "scripts/start-windows.bat" "dist/nahida-agent/"
          Copy-Item "scripts/auto-update.bat" "dist/nahida-agent/"

          # Install NSIS
          choco install nsis -y

          # Generate NSIS installer script
          $nsisContent = @"
          !define PRODUCT_NAME "Nahida Agent"
          !define PRODUCT_VERSION "$version"
          !define PRODUCT_PUBLISHER "Nahida Agent Team"
          !define PRODUCT_EXE "nahida-agent.exe"
          !define PRODUCT_DIR "nahida-agent"

          Name "`${PRODUCT_NAME} `${PRODUCT_VERSION}"
          OutFile "nahida-agent-windows-x64-v`${PRODUCT_VERSION}-setup.exe"
          InstallDir "`$PROGRAMFILES64\`${PRODUCT_NAME}"
          InstallDirRegKey HKLM "Software\`${PRODUCT_NAME}" "InstallDir"
          RequestExecutionLevel admin
          SetCompressor /SOLID lzma

          !include "MUI2.nsh"
          !define MUI_ICON "web\frontend\public\assets\favicon.ico"
          !define MUI_UNICON "web\frontend\public\assets\favicon.ico"

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_UNPAGE_WELCOME
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_UNPAGE_FINISH

          !insertmacro MUI_LANGUAGE "SimpChinese"
          !insertmacro MUI_LANGUAGE "English"

          Section "MainSection" SEC01
            SetOutPath "`$INSTDIR"
            SetOverwrite on
            File /r "dist\nahida-agent\*.*"

            CreateShortCut "`$DESKTOP\纳西妲.lnk" "`$INSTDIR\start-windows.bat" "" "`$INSTDIR\nahida-agent.exe" 0
            CreateDirectory "`$SMPROGRAMS\`${PRODUCT_NAME}"
            CreateShortCut "`$SMPROGRAMS\`${PRODUCT_NAME}\纳西妲.lnk" "`$INSTDIR\start-windows.bat" "" "`$INSTDIR\nahida-agent.exe" 0
            CreateShortCut "`$SMPROGRAMS\`${PRODUCT_NAME}\卸载.lnk" "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section -AdditionalIcons
            WriteIniStr "`$INSTDIR\`${PRODUCT_NAME}.url" "InternetShortcut" "URL" "https://github.com/long-safe-accont-4567-uvwxyz-9876/nahida-agent"
          SectionEnd

          Section -Post
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\`${PRODUCT_NAME}" "InstallDir" "`$INSTDIR"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\`${PRODUCT_NAME}" "DisplayName" "`${PRODUCT_NAME}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\`${PRODUCT_NAME}" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\`${PRODUCT_NAME}" "DisplayVersion" "`${PRODUCT_VERSION}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\`${PRODUCT_NAME}" "Publisher" "`${PRODUCT_PUBLISHER}"
          SectionEnd

          Section Uninstall
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\纳西妲.lnk"
            RMDir /r "`$SMPROGRAMS\`${PRODUCT_NAME}"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\`${PRODUCT_NAME}"
            DeleteRegKey HKLM "Software\`${PRODUCT_NAME}"
          SectionEnd
          "@

          Set-Content -Path "installer.nsi" -Value $nsisContent -Encoding UTF8

          # Build NSIS installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

          # Verify the installer was created
          $installerPath = "nahida-agent-windows-x64-v${version}-setup.exe"
          if (Test-Path $installerPath) {
            Write-Host "Installer created: $installerPath"
            Write-Host "Size: $((Get-Item $installerPath).Length / 1MB) MB"
          } else {
            Write-Error "Installer was not created!"
            exit 1
          }

      - name: Package (Linux x86_64)
        if: matrix.platform == 'linux-x86_64'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Create version file and auto-update flag
          echo -n "$VERSION" > dist/nahida-agent/.version
          touch dist/nahida-agent/.auto_update
          # Copy auto-update script
          mkdir -p dist/nahida-agent/scripts
          cp scripts/auto-update.sh dist/nahida-agent/scripts/
          chmod +x dist/nahida-agent/scripts/auto-update.sh
          tar -czf nahida-agent-linux-x86_64-v${VERSION}.tar.gz -C dist nahida-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            nahida-agent-windows-x64-*-setup.exe
            nahida-agent-linux-x86_64-*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version || github.ref_name }}
          name: Release v${{ inputs.version || github.ref_name }}
          files: |
            artifacts/nahida-agent-windows-x64-*-setup.exe
            artifacts/nahida-agent-linux-x86_64-*.tar.gz