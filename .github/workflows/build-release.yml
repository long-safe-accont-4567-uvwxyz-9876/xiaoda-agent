name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        default: '0.3.30'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64
            artifact: nahida-agent-windows-x64
          - runner: ubuntu-latest
            platform: linux-x86_64
            artifact: nahida-agent-linux-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure assets are present
        shell: python
        run: |
          import os, json, base64, urllib.request, urllib.error
          TOKEN = os.environ.get('GITHUB_TOKEN', '')
          H = {"Authorization": f"Bearer {TOKEN}", "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28"}
          REPO = os.environ.get('GITHUB_REPOSITORY', '')
          OWNER, REPO_NAME = REPO.split('/')
          def download_tree(path, local_base):
              url = f'https://api.github.com/repos/{OWNER}/{REPO_NAME}/contents/{path}?ref=main'
              req = urllib.request.Request(url, headers=H)
              try:
                  with urllib.request.urlopen(req) as r:
                      items = json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f'  HTTP {e.code} for {path}, skipping')
                  return
              for item in items:
                  local = os.path.join(local_base, item['name'])
                  if item['type'] == 'dir':
                      os.makedirs(local, exist_ok=True)
                      download_tree(item['path'], local)
                  else:
                      req2 = urllib.request.Request(item['url'], headers=H)
                      try:
                          with urllib.request.urlopen(req2) as r2:
                              data = json.loads(r2.read())
                          with open(local, 'wb') as f:
                              f.write(base64.b64decode(data['content']))
                          print(f'  OK: {item["path"]} ({item["size"]} bytes)')
                      except Exception as e:
                          print(f'  FAIL: {item["path"]} - {e}')
          for sub in ['assets/stickers', 'assets/voice_refs']:
              os.makedirs(sub, exist_ok=True)
              download_tree(sub, sub)
          count = sum(len(files) for _, _, files in os.walk('assets'))
          print(f'Total files in assets/: {count}')
          if count < 55:
              print(f'WARNING: Expected 55+ files in assets/, got {count}')
              raise SystemExit(1)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean old frontend dist
        shell: bash
        run: |
          [ -d web/dist ] && rm -rf web/dist || true
          # 清理 PyInstaller 构建缓存，确保全量重建（--clean 只清理 build/ 不清理 dist/）
          rm -rf build/ dist/ 2>/dev/null || true
          # 确保 .env 和敏感文件不被打包进安装包
          rm -f .env .env.prod .env.local 2>/dev/null || true
          rm -f config/webui_overrides.json 2>/dev/null || true
          rm -rf credentials/ 2>/dev/null || true
          find . -name "*.key" -not -path "./.git/*" -delete 2>/dev/null || true

      - name: Install frontend deps
        working-directory: web/frontend
        run: npm install

      - name: Build frontend (vite)
        working-directory: web/frontend
        run: npm run build

      - name: Verify frontend build
        shell: bash
        run: |
          echo "=== web/dist contents ==="
          ls -la web/dist/
          echo "=== web/dist/assets ==="
          ls web/dist/assets/ | head -40
          # Verify key files exist
          test -f web/dist/index.html || (echo "ERROR: index.html not found!" && exit 1)
          # Verify /setup route is included in built JS
          FOUND=0
          for f in web/dist/assets/*.js; do
            if grep -q '"setup"' "$f" 2>/dev/null; then
              FOUND=1
              echo "/setup route found in: $(basename $f) - OK"
              break
            fi
          done
          if ls web/dist/assets/SetupWizardView-*.js 2>/dev/null | grep -q .; then
            FOUND=1
            echo "SetupWizardView chunk found - OK"
          fi
          if [ $FOUND -eq 0 ]; then
            echo "FATAL: /setup route or SetupWizardView chunk NOT found in built dist!"
            echo "This means the setup page will be blank. Build aborted."
            exit 1
          fi
          echo "Frontend build verified OK"

      - name: Create media directories
        shell: bash
        run: |
          mkdir -p web/media/stickers
          touch web/media/stickers/.gitkeep

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt || true
          pip install fastapi uvicorn[standard] websockets python-multipart sse-starlette httpx Pillow numpy rich python-dotenv loguru openai aiosqlite pydantic jieba pyyaml pilk

      - name: Verify pilk installed (SILK codec for voice messages)
        shell: python
        run: |
          try:
              import pilk
              print(f"pilk version: {pilk.__version__}")
              print("pilk OK - voice messages will work")
          except ImportError:
              print("FATAL: pilk not installed! Voice messages will fail.")
              raise SystemExit(1)

      - name: Verify assets before build
        shell: bash
        run: |
          echo "=== assets/ file count and total size ==="
          find assets/ -type f | wc -l
          du -sh assets/
          du -sh assets/stickers/ assets/voice_refs/ 2>/dev/null
          echo "=== Sample files ==="
          find assets/ -type f | head -10
          echo "=== Total bytes ==="
          find assets/ -type f -exec stat --format='%s' {} + 2>/dev/null | awk '{s+=$1} END {print s}'

      - name: Sanitize developer PII from config
        shell: bash
        run: |
          # Remove developer personal info from workspace templates before bundling
          sed -i 's/刘润飞/（用户姓名）/g' config/workspace/USER.md 2>/dev/null || true
          sed -i 's/刘润飞/（用户姓名）/g' config/workspace/SOUL.md 2>/dev/null || true
          echo "Sanitized developer PII from config/workspace/"

      - name: Build with PyInstaller
        run: pyinstaller nahida-agent.spec --clean --noconfirm
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8

      - name: Verify pilk C extension bundled (voice messages)
        shell: bash
        run: |
          echo "=== Checking pilk C extension in build output ==="
          PILK_FOUND=0
          # Windows: _pilk.cp311-win_amd64.pyd
          # Linux: _pilk.cpython-311-*.so
          if find dist/nahida-agent -name "_pilk*" -print -quit 2>/dev/null | grep -q .; then
            echo "OK: pilk C extension found:"
            find dist/nahida-agent -name "_pilk*" -exec ls -lh {} \;
            PILK_FOUND=1
          fi
          if [ $PILK_FOUND -eq 0 ]; then
            echo "FATAL: pilk C extension (_pilk.so/.pyd) not found in build output!"
            echo "Voice messages will fail with '缺少 SILK 编码库' error."
            exit 1
          fi
          echo "pilk C extension verified OK"

      - name: Verify Pillow C extension bundled (image compression)
        shell: bash
        run: |
          echo "=== Checking Pillow C extension in build output ==="
          PIL_FOUND=0
          # Windows: _imaging.cp311-win_amd64.pyd
          # Linux: _imaging.cpython-311-*.so
          if find dist/nahida-agent -name "_imaging*" -print -quit 2>/dev/null | grep -q .; then
            echo "OK: Pillow _imaging C extension found:"
            find dist/nahida-agent -name "_imaging*" -exec ls -lh {} \;
            PIL_FOUND=1
          fi
          if [ $PIL_FOUND -eq 0 ]; then
            echo "FATAL: Pillow _imaging C extension not found in build output!"
            echo "Image compression for QQ image sending will fail."
            exit 1
          fi
          echo "Pillow C extension verified OK"

      - name: Ensure assets bundled in dist
        shell: bash
        run: |
          # 确保 assets 资源（stickers/voice_refs）进入安装包
          mkdir -p dist/nahida-agent/assets
          cp -r assets/* dist/nahida-agent/assets/ 2>/dev/null || true
          # 验证关键资源文件存在
          echo "=== dist/nahida-agent/assets 内容 ==="
          find dist/nahida-agent/assets -type f | head -20
          echo "=== 资源文件计数 ==="
          echo "voice_refs 文件数: $(find dist/nahida-agent/assets/voice_refs -type f 2>/dev/null | wc -l)"
          echo "stickers 文件数: $(find dist/nahida-agent/assets/stickers -type f 2>/dev/null | wc -l)"
          # 关键文件必须存在
          test -f dist/nahida-agent/assets/voice_refs/keli.mp3 || (echo "ERROR: keli.mp3 missing!" && exit 1)
          test -f dist/nahida-agent/assets/voice_refs/nahida.wav || (echo "ERROR: nahida.wav missing!" && exit 1)
          test -f dist/nahida-agent/assets/voice_refs/nahida_hq.wav || (echo "ERROR: nahida_hq.wav missing!" && exit 1)
          echo "Assets bundled OK"

      - name: Verify assets in build output
        shell: bash
        continue-on-error: true
        run: |
          echo "=== dist/nahida-agent/assets/ file count and total size ==="
          ASSETS_COUNT=$(find dist/nahida-agent/assets/ -type f 2>/dev/null | wc -l)
          echo "Files in dist assets: $ASSETS_COUNT"
          du -sh dist/nahida-agent/assets/ 2>/dev/null || echo "dist/nahida-agent/assets/ not found"
          du -sh dist/nahida-agent/assets/stickers/ 2>/dev/null || echo "stickers dir not found"
          du -sh dist/nahida-agent/assets/voice_refs/ 2>/dev/null || echo "voice_refs dir not found"
          echo "=== Sample files in dist ==="
          find dist/nahida-agent/assets/ -type f 2>/dev/null | head -10
          echo "=== Total bytes in dist assets ==="
          find dist/nahida-agent/assets/ -type f -exec stat --format='%s' {} + 2>/dev/null | awk '{s+=$1} END {print s+0}'
          echo "=== dist/nahida-agent/ top-level dirs ==="
          ls -la dist/nahida-agent/ 2>/dev/null | head -30
          if [ "$ASSETS_COUNT" -lt 50 ]; then
            echo "WARNING: Expected 50+ files in dist assets, got $ASSETS_COUNT"
          fi

      - name: Strip secrets from build output
        shell: bash
        run: |
          # 强制删除构建产物中的敏感文件（双重保险）
          find dist/nahida-agent -name ".env" -not -name ".env.example" -delete 2>/dev/null || true
          find dist/nahida-agent -name "webui_overrides.json" -delete 2>/dev/null || true
          find dist/nahida-agent -name "*.key" -delete 2>/dev/null || true
          find dist/nahida-agent -type d -name "credentials" -exec rm -rf {} + 2>/dev/null || true
          echo "Stripped secrets from build output"

      - name: Verify no secrets in build
        shell: bash
        run: |
          echo "=== Scanning for leaked secrets ==="
          FOUND=0
          # Check for .env files (not .env.example)
          if find dist/nahida-agent -name ".env" -not -name ".env.example" -print -quit 2>/dev/null | grep -q .; then
            echo "FOUND: .env file"; FOUND=1
          fi
          # Check for .key files
          if find dist/nahida-agent -name "*.key" -print -quit 2>/dev/null | grep -q .; then
            echo "FOUND: .key file"; FOUND=1
          fi
          # Check for credentials directory
          if find dist/nahida-agent -type d -name "credentials" -print -quit 2>/dev/null | grep -q .; then
            echo "FOUND: credentials dir"; FOUND=1
          fi
          # Check for webui_overrides.json
          if find dist/nahida-agent -name "webui_overrides.json" -print -quit 2>/dev/null | grep -q .; then
            echo "FOUND: webui_overrides.json"; FOUND=1
          fi
          # Check for real API key patterns (sk- followed by 20+ chars, not in .env.example)
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" dist/nahida-agent/ --include="*.json" --include="*.env" --include="*.key" -l 2>/dev/null | grep -v ".env.example" | grep -q .; then
            echo "FOUND: API key pattern"; FOUND=1
          fi
          # === 新增：开发者个人信息扫描 ===
          # Check for Chinese name (developer PII)
          if grep -rI "刘润飞" dist/nahida-agent/ 2>/dev/null; then
            echo "❌ 发现敏感信息：中文姓名"
            exit 1
          fi
          # Check for GitHub username (developer PII)
          if grep -rI "liu-runfei" dist/nahida-agent/ 2>/dev/null; then
            echo "❌ 发现敏感信息：GitHub 用户名"
            exit 1
          fi
          # Check for local absolute paths (developer PII)
          if grep -rI "/home/orangepi" dist/nahida-agent/ 2>/dev/null; then
            echo "❌ 发现敏感信息：本地路径 /home/orangepi"
            exit 1
          fi
          if grep -rI "/media/orangepi" dist/nahida-agent/ 2>/dev/null; then
            echo "❌ 发现敏感信息：本地路径 /media/orangepi"
            exit 1
          fi
          # Check for workspace personal files that should be excluded
          for f in USER.md SOUL.md IDENTITY.md MEMORY.md; do
            if find dist/nahida-agent -name "$f" -not -path "*/node_modules/*" | grep -q .; then
              echo "❌ 发现应被排除的文件：$f"
              exit 1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "ERROR: Leaked secrets found in build!"
            exit 1
          fi
          echo "No secrets found - OK"

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package (Windows - NSIS Installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $ErrorActionPreference = "Continue"

          Set-Content -Path "dist/nahida-agent/.version" -Value $version -NoNewline
          New-Item -Path "dist/nahida-agent/.auto_update" -ItemType File -Force
          Copy-Item "scripts/start-windows.bat" "dist/nahida-agent/"
          Copy-Item "scripts/auto-update.bat" "dist/nahida-agent/"
          Copy-Item "scripts/open-browser.ps1" "dist/nahida-agent/"
          Copy-Item "assets/nahida-icon.ico" "dist/nahida-agent/nahida-icon.ico"

          choco install nsis -y --no-progress
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsisPath)) {
            $nsisPath = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          }

          if ($nsisPath -and (Test-Path $nsisPath)) {
            Write-Host "NSIS found at: $nsisPath"
            $nsi = Get-Content "scripts/installer.nsi" -Raw
            $nsi = $nsi -replace '\$\{VERSION\}', $version
            [System.IO.File]::WriteAllText("$PWD\installer.nsi", $nsi, [System.Text.UTF8Encoding]::new($true))

            Write-Host "Running NSIS build..."
            & $nsisPath installer.nsi
            if ($LASTEXITCODE -ne 0) {
              Write-Host "NSIS build failed, falling back to ZIP..."
              Compress-Archive -Path "dist\nahida-agent" -DestinationPath "nahida-agent-windows-x64-v${version}.zip"
            } else {
              $installerPath = "nahida-agent-windows-x64-v${version}-setup.exe"
              if (Test-Path $installerPath) {
                Write-Host "Installer created: $installerPath ($([math]::Round((Get-Item $installerPath).Length / 1MB, 1)) MB)"
              } else {
                Write-Host "Installer not found, falling back to ZIP..."
                Compress-Archive -Path "dist\nahida-agent" -DestinationPath "nahida-agent-windows-x64-v${version}.zip"
              }
            }
          } else {
            Write-Host "NSIS not found, creating ZIP..."
            Compress-Archive -Path "dist\nahida-agent" -DestinationPath "nahida-agent-windows-x64-v${version}.zip"
          }

          # Create tar.gz for auto-update (Windows 10 1803+ includes tar)
          Write-Host "Creating tar.gz for auto-update..."
          tar -czf "nahida-agent-windows-x64-v${version}.tar.gz" -C dist nahida-agent

      - name: Package (Linux x86_64)
        if: matrix.platform == 'linux-x86_64'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo -n "$VERSION" > dist/nahida-agent/.version
          touch dist/nahida-agent/.auto_update
          mkdir -p dist/nahida-agent/scripts
          cp scripts/auto-update.sh dist/nahida-agent/scripts/
          chmod +x dist/nahida-agent/scripts/auto-update.sh
          tar -czf nahida-agent-linux-x86_64-v${VERSION}.tar.gz -C dist nahida-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            nahida-agent-windows-x64-*-setup.exe
            nahida-agent-windows-x64-*.zip
            nahida-agent-windows-x64-*.tar.gz
            nahida-agent-linux-x86_64-*.tar.gz
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          files: |
            artifacts/nahida-agent-windows-x64-*-setup.exe
            artifacts/nahida-agent-windows-x64-*.zip
            artifacts/nahida-agent-windows-x64-*.tar.gz
            artifacts/nahida-agent-linux-x86_64-*.tar.gz
