name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        default: '0.2.1'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64
            artifact: nahida-agent-windows-x64
          - runner: ubuntu-latest
            platform: linux-x86_64
            artifact: nahida-agent-linux-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt || true
          pip install fastapi uvicorn[standard] websockets python-multipart sse-starlette httpx Pillow numpy rich python-dotenv loguru openai aiosqlite pydantic jieba pyyaml

      - name: Build with PyInstaller
        run: pyinstaller nahida-agent.spec --clean --noconfirm

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package (Windows - NSIS Installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $ErrorActionPreference = "Continue"

          Set-Content -Path "dist/nahida-agent/.version" -Value $version -NoNewline
          New-Item -Path "dist/nahida-agent/.auto_update" -ItemType File -Force
          Copy-Item "scripts/start-windows.bat" "dist/nahida-agent/"
          Copy-Item "scripts/auto-update.bat" "dist/nahida-agent/"
          Copy-Item "assets/nahida-icon.ico" "dist/nahida-agent/nahida-icon.ico"

          choco install nsis -y --no-progress
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsisPath)) {
            $nsisPath = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          }

          if ($nsisPath -and (Test-Path $nsisPath)) {
            Write-Host "NSIS found at: $nsisPath"
            $nsi = Get-Content "scripts/installer.nsi" -Raw
            $nsi = $nsi -replace '\$\{VERSION\}', $version
            [System.IO.File]::WriteAllText("$PWD\installer.nsi", $nsi, [System.Text.UTF8Encoding]::new($true))

            Write-Host "Running NSIS build..."
            & $nsisPath installer.nsi
            if ($LASTEXITCODE -ne 0) {
              Write-Host "NSIS build failed, falling back to ZIP..."
              Compress-Archive -Path "dist\nahida-agent" -DestinationPath "nahida-agent-windows-x64-v${version}.zip"
            } else {
              $installerPath = "nahida-agent-windows-x64-v${version}-setup.exe"
              if (Test-Path $installerPath) {
                Write-Host "Installer created: $installerPath ($([math]::Round((Get-Item $installerPath).Length / 1MB, 1)) MB)"
              } else {
                Write-Host "Installer not found, falling back to ZIP..."
                Compress-Archive -Path "dist\nahida-agent" -DestinationPath "nahida-agent-windows-x64-v${version}.zip"
              }
            }
          } else {
            Write-Host "NSIS not found, creating ZIP..."
            Compress-Archive -Path "dist\nahida-agent" -DestinationPath "nahida-agent-windows-x64-v${version}.zip"
          }

      - name: Package (Linux x86_64)
        if: matrix.platform == 'linux-x86_64'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo -n "$VERSION" > dist/nahida-agent/.version
          touch dist/nahida-agent/.auto_update
          mkdir -p dist/nahida-agent/scripts
          cp scripts/auto-update.sh dist/nahida-agent/scripts/
          chmod +x dist/nahida-agent/scripts/auto-update.sh
          tar -czf nahida-agent-linux-x86_64-v${VERSION}.tar.gz -C dist nahida-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            nahida-agent-windows-x64-*-setup.exe
            nahida-agent-windows-x64-*.zip
            nahida-agent-linux-x86_64-*.tar.gz
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version || github.ref_name }}
          name: Release v${{ inputs.version || github.ref_name }}
          files: |
            artifacts/nahida-agent-windows-x64-*-setup.exe
            artifacts/nahida-agent-windows-x64-*.zip
            artifacts/nahida-agent-linux-x86_64-*.tar.gz
