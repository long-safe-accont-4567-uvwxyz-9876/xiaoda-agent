name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64
            artifact: nahida-agent-windows-x64
          - runner: ubuntu-latest
            platform: linux-x86_64
            artifact: nahida-agent-linux-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt || true
          # Ensure core deps are installed even if optional ones fail
          pip install fastapi uvicorn[standard] websockets python-multipart sse-starlette httpx Pillow numpy rich python-dotenv loguru openai aiosqlite pydantic jieba pyyaml

      - name: Build with PyInstaller
        run: pyinstaller nahida-agent.spec --clean --noconfirm

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "nahida-agent-windows-x64-v${version}.zip"
          Compress-Archive -Path dist/nahida-agent/*, scripts/start-windows.bat -DestinationPath $zipName

      - name: Package (Linux x86_64)
        if: matrix.platform == 'linux-x86_64'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -czf nahida-agent-linux-x86_64-v${VERSION}.tar.gz -C dist nahida-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            nahida-agent-windows-x64-*.zip
            nahida-agent-linux-x86_64-*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version || github.ref_name }}
          name: Release v${{ inputs.version || github.ref_name }}
          files: |
            artifacts/nahida-agent-windows-x64-*.zip
            artifacts/nahida-agent-linux-x86_64-*.tar.gz
