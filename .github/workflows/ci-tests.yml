name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: pytest tests/ -v --tb=short --junitxml=pytest-report.xml

      - name: Run Harness benchmark
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/benchmark_harness.py

      - name: Matrix governance L5 health check
        env:
          PYTHONIOENCODING: utf-8
        shell: bash
        run: |
          # L5 效果验证: 4 指标 + 回滚阈值检查
          # 矩阵变更 PR 必跑: 退化超阈值时 exit 1 阻止合并
          python -c "
          import sys, json
          sys.path.insert(0, '.')
          from memory.matrix_governance import evaluate_matrix_health, capture_baseline
          baseline = capture_baseline()
          health = evaluate_matrix_health(baseline)
          print('=== Matrix Health Report ===')
          print(json.dumps(health.to_dict(), indent=2, ensure_ascii=False))
          # 硬阈值: 场景识别准确率不得低于 0.7 (Golden Dataset 至少 21/30 正确)
          if health.scene_accuracy < 0.7:
              print('FAIL: scene_accuracy too low')
              sys.exit(1)
          # 退化检测: should_rollback 为 True 时阻止合并
          if health.should_rollback:
              print('FAIL: matrix degraded, rollback required')
              for r in health.rollback_reasons:
                  print('  -', r)
              sys.exit(1)
          print('PASS: matrix health OK')
          "

      - name: Matrix governance A/B shadow test
        env:
          PYTHONIOENCODING: utf-8
        shell: bash
        run: |
          # L4 A/B shadow 测试: 候选矩阵 vs 当前矩阵
          # 主指标纯本地 0 LLM 调用, 仅检测显著退化
          python -c "
          import sys, json
          sys.path.insert(0, '.')
          from memory.matrix_governance import ABTestRunner
          runner = ABTestRunner(mode='shadow')
          report = runner.run_shadow()
          print('=== A/B Shadow Report ===')
          print(json.dumps(report.to_dict(), indent=2, ensure_ascii=False))
          # 候选矩阵显著退化时阻止合并
          if report.recommendation == 'rollback':
              print('FAIL: candidate matrix significantly worse than control')
              sys.exit(1)
          print('PASS: A/B shadow OK, recommendation =', report.recommendation)
          "

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.os }}
          path: pytest-report.xml
          if-no-files-found: warn
