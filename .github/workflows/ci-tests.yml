name: CI Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      # 允许 coverage-comment-action 发布 PR 评论
      pull-requests: write
      # 允许更新 python-coverage-comment-action-data 分支与编辑已发布评论
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock -q

      - name: Create test environment
        run: |
          # 创建必要的目录
          mkdir -p ~/.ai-agent/logs
          mkdir -p ~/.ai-agent/workspace
          mkdir -p ~/.ai-agent/config/agents
          mkdir -p ~/.ai-agent/data/db

          # 复制配置文件
          cp -r config/workspace ~/.ai-agent/workspace/
          cp -r config/agents/*.json ~/.ai-agent/config/agents/ 2>/dev/null || true

      - name: Version sync check
        run: python scripts/check_version_sync.py --ci

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=. --cov-report=term-missing --cov-report=json:coverage.json \
            --deselect tests/test_a4_rag_root_fix.py::TestIntentClassifyDefault::test_intent_llm_classify_default_false \
            -m "not slow and not e2e_real" \
            --timeout=60 \
            -q 2>&1 | tail -50
        continue-on-error: true

      - name: Run critical tests (strict)
        run: |
          python -m pytest \
            tests/test_smoke.py \
            tests/test_agent_routing.py \
            tests/test_context_compressor.py \
            tests/test_risk_classifier.py \
            tests/test_error_classifier.py \
            tests/test_model_route_validation.py \
            tests/test_matrix_governance.py \
            tests/test_prompt_integration.py \
            tests/test_cognitive_memory.py \
            tests/test_hopfield_layer.py \
            tests/test_ssrf_guard.py \
            tests/test_tool_guardrails.py \
            tests/test_credential_pool.py \
            tests/test_credential_vault.py \
            tests/test_cancel_token.py \
            tests/test_event_bus.py \
            tests/test_shared_blackboard.py \
            tests/test_circuit_breaker.py \
            -v --tb=short

      - name: Coverage summary
        if: always()
        run: |
          echo "=== Coverage Summary ==="
          if [ -f coverage.json ]; then
            python -c "import json; d=json.load(open('coverage.json')); t=d.get('totals',{}); print(f'Line coverage: {t.get(chr(99)+chr(111)+chr(118)+chr(101)+chr(114)+chr(101)+chr(100)+chr(95)+chr(108)+chr(105)+chr(110)+chr(101)+chr(115),0)}/{t.get(chr(110)+chr(117)+chr(109)+chr(95)+chr(115)+chr(116)+chr(97)+chr(116)+chr(101)+chr(109)+chr(101)+chr(110)+chr(116)+chr(115),0)} = {t.get(chr(112)+chr(101)+chr(114)+chr(99)+chr(101)+chr(110)+chr(116)+chr(95)+chr(99)+chr(111)+chr(118)+chr(101)+chr(114)+chr(101)+chr(100),0):.1f}%')"
          else
            echo "No coverage data found."
          fi

      - name: Coverage comment
        id: coverage_comment
        if: always() && github.event_name == 'pull_request' && hashFiles('.coverage') != ''
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          # 低于 50% 为红色徽章，50-100% 为橙色（PR 评论会显示覆盖率 evolution）
          MINIMUM_ORANGE: 50
          # 标注缺失覆盖的行（warning 级别，不阻塞 PR）
          ANNOTATE_MISSING_LINES: true
          ANNOTATION_TYPE: warning
        continue-on-error: true

      - name: Coverage drop warning
        if: always() && github.event_name == 'pull_request' && steps.coverage_comment.outputs.reference_percent_covered != ''
        shell: bash
        env:
          REF_COV: ${{ steps.coverage_comment.outputs.reference_percent_covered }}
          NEW_COV: ${{ steps.coverage_comment.outputs.new_percent_covered }}
        # 调用独立脚本, 避免 python -c "..." 多行代码在 YAML literal block 中
        # 因缩进为 0 而破坏 literal block scalar 的解析问题.
        run: python scripts/check_coverage_drop.py "$REF_COV" "$NEW_COV"
        continue-on-error: true

      - name: Store Pull Request comment artifact
        if: always() && steps.coverage_comment.outputs.comment_file_written == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
        continue-on-error: true

      - name: Test summary
        if: always()
        run: |
          echo "=== Test Summary ==="
          echo "CI tests completed. Check results above."

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install ruff -q

      - name: Run Ruff check
        run: |
          ruff check . --select=E9,F63,F7,F82 --output-format=github

      - name: Python syntax check
        run: |
          python -m py_compile agent.py agent_context.py config.py
          echo "Syntax check completed."

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit pip-audit -q

      - name: Run Bandit security scan
        run: |
          bandit -r . -x ./tests,./chaos,./.venv,./node_modules -f json -o bandit-report.json || true
          bandit -r . -x ./tests,./chaos,./.venv,./node_modules -f screen || true

      - name: Run pip-audit dependency scan
        run: |
          pip install -r requirements.lock -q
          pip-audit --desc || true

      - name: Security summary
        if: always()
        run: |
          echo "=== Security Scan Summary ==="
          if [ -f bandit-report.json ]; then
            python -c "import json; d=json.load(open('bandit-report.json')); h=len([r for r in d.get('results',[]) if r.get('issue_severity')=='HIGH']); m=len([r for r in d.get('results',[]) if r.get('issue_severity')=='MEDIUM']); print(f'HIGH: {h} issues, MEDIUM: {m} issues')"
          else
            echo "No bandit report found."
          fi