[pytest]
testpaths = tests
addopts = -v --tb=short
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
# 单测超时保护：避免单个测试因 SQLite 锁/asyncio event loop 卡死而拖垮整次运行。
# thread 方法兼容 asyncio 测试（signal 方法会与 asyncio 冲突）。
# 60s 已足够覆盖最慢的迁移测试；超时即标 FAIL 并打印堆栈。
timeout = 60
timeout_method = thread
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore:Using `httpx` with `starlette.testclient` is deprecated:Warning
