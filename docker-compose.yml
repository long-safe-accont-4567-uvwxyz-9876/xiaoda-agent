services:
  agent:
    image: ghcr.io/${GITHUB_OWNER:-long-safe-accont-4567-uvwxyz-9876}/xiaoda-agent:latest
    container_name: xiaoda-agent
    ports:
      - "${WEBUI_PORT:-8082}:${WEBUI_PORT:-8082}"
    volumes:
      - agent-data:/data
      - ./.env:/app/.env:ro
    environment:
      - KIOXIA_DATA_DIR=/data
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=${WEBUI_PORT:-8082}
      - AGENTLY_CLI_HOME=/data/agently-cli
    restart: unless-stopped
    # 安全加固：丢弃所有非必要 Linux capabilities
    # 以非特权用户 appuser 运行时，仅需 NET_BIND_SERVICE 绑定低端口（当前使用 8082 无需额外 cap_add）
    cap_drop:
      - ALL
    # 阻止子进程通过 setuid/setgid 提权（防容器内提权）
    security_opt:
      - no-new-privileges:true
    # 容器根文件系统只读；所有写入必须落到 volume 或 tmpfs
    # SQLite 数据库与 WAL 文件均位于 /data volume 下（KIOXIA_DATA_DIR=/data），
    # 因此 read_only: true 不影响 SQLite WAL 模式读写
    read_only: true
    # Python tempfile（utils/atomic_write.py、utils/file_receiver.py、agent.py）默认走 /tmp
    # 通过 tmpfs 提供可写的 /tmp，避免 read_only 导致 tempfile 失败
    tmpfs:
      - /tmp
    # 硬件直通（可选，ARM 设备如 Orange Pi）
    # devices:
    #   - /dev/i2c-0:/dev/i2c-0
    #   - /dev/video0:/dev/video0
    #   - /sys/class/gpio:/sys/class/gpio
    #   - /sys/class/pwm:/sys/class/pwm
    deploy:
      resources:
        limits:
          memory: 1.5G

volumes:
  agent-data:
