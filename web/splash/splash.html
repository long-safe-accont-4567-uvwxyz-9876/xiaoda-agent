<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahida Agent</title>
    <link rel="stylesheet" href="splash.css">
</head>
<body>
    <!-- 底部极简光晕 -->
    <div class="aurora">
        <div class="aurora-layer aurora-base"></div>
        <div class="aurora-layer aurora-glow"></div>
    </div>

    <!-- SiriWave 波浪 Canvas（底部水平波浪） -->
    <canvas id="siri-wave"></canvas>

    <!-- 中央内容 -->
    <div class="center-content">
        <div class="leaf-emblem">
            <svg viewBox="0 0 80 100" width="52" height="65">
                <defs>
                    <linearGradient id="leaf-grad" x1="50%" y1="0%" x2="50%" y2="100%">
                        <stop offset="0%" stop-color="#b8f080"/>
                        <stop offset="100%" stop-color="#4a9a20"/>
                    </linearGradient>
                    <filter id="leaf-glow">
                        <feGaussianBlur stdDeviation="4" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <path d="M40 4 C18 28 14 56 40 96 C66 56 62 28 40 4Z" fill="url(#leaf-grad)" filter="url(#leaf-glow)" opacity="0.9"/>
                <path d="M40 4 L40 96" stroke="#0f1f17" stroke-width="0.8" opacity="0.15"/>
                <path d="M40 30 C32 38 26 48 28 56" stroke="#0f1f17" stroke-width="0.5" opacity="0.1" fill="none"/>
                <path d="M40 30 C48 38 54 48 52 56" stroke="#0f1f17" stroke-width="0.5" opacity="0.1" fill="none"/>
            </svg>
        </div>

        <h1 class="title">Nahida Agent</h1>
        <p class="subtitle">AI Multi-Agent Assistant</p>

        <div class="loading-area">
            <div class="loading-bar">
                <div class="loading-bar-inner" id="loading-bar"></div>
            </div>
            <p class="loading-text" id="loading-text">Initializing</p>
        </div>

        <button class="enter-btn" id="enter-btn">Enter</button>
    </div>

    <script src="splash.js"></script>
</body>
</html>
