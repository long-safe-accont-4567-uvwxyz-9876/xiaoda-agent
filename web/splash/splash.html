<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaoda Agent</title>
    <link rel="stylesheet" href="splash.css">
    <link rel="stylesheet" href="vine-border.css">
</head>
<body>
    <!-- Web UI 界面（墨迹转场擦除 splash 后露出） -->
    <iframe id="webui-frame" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;z-index:0;"></iframe>

    <!-- 全屏 WebGL 背景 Canvas（渐变 + 极光 + 波浪 + 粒子） -->
    <canvas id="bg-canvas"></canvas>

    <!-- InkReveal 墨迹转场 Canvas -->
    <canvas id="ink-canvas" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;pointer-events:none;"></canvas>

    <!-- 3D 藤蔓缠绕边框 -->
    <div class="vine-frame">
        <svg xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- 中央内容 -->
    <div class="center-content">
        <div class="leaf-emblem">
         <div class="leaf-spin">
            <svg viewBox="0 0 48 48" width="84" height="84" fill="none">
                <!-- 外环藤纹 -->
                <circle cx="24" cy="24" r="21" stroke="#7fd650" stroke-width="1.2" opacity="0.35"
                        stroke-dasharray="4 5" stroke-linecap="round" class="vine-ring"/>
                <!-- 四片主叶 -->
                <g stroke="#7fd650" stroke-width="1.8" stroke-linejoin="round" fill="rgba(127,214,80,0.16)">
                    <path class="leaf-petal" d="M24 6c4 4.5 4 9.5 0 13-4-3.5-4-8.5 0-13Z" />
                    <path class="leaf-petal" d="M42 24c-4.5 4-9.5 4-13 0 3.5-4 8.5-4 13 0Z" />
                    <path class="leaf-petal" d="M24 42c-4-4.5-4-9.5 0-13 4 3.5 4 8.5 0 13Z" />
                    <path class="leaf-petal" d="M6 24c4.5-4 9.5-4 13 0-3.5 4-8.5 4-13 0Z" />
                </g>
                <!-- 核心智慧之种 -->
                <circle cx="24" cy="24" r="3.4" fill="#7fd650" class="seed-core"/>
                <circle cx="24" cy="24" r="6.5" stroke="#7fd650" stroke-width="1" opacity="0.5" class="seed-ring"/>
            </svg>
         </div>
        </div>

        <h1 class="title" id="title-text"></h1>
        <p class="subtitle" id="subtitle-text"></p>

        <div class="loading-area">
            <div class="loading-bar">
                <div class="loading-bar-inner" id="loading-bar"></div>
            </div>
            <p class="loading-text" id="loading-text">Initializing</p>
        </div>

        <div class="enter-btn-wrap" id="enter-btn-wrap">
            <button class="enter-btn" id="enter-btn">Enter</button>
        </div>
    </div>

    <script src="vine-border.js"></script>
    <script src="splash.js"></script>
</body>
</html>
