# XP 等级对应的纳西妲亲密度配置
# 参考 core/xp_system.py 中的 XPLevel 枚举
# 字段说明:
#   label:              等级中文标签
#   address_term:       称呼用户的方式 ("你" / "{nickname}" 占位符)
#   tone:               语气风格 (polite/warm/intimate/deep_intimate/soulmate)
#   initiative:         主动性 0-1 (是否主动发起话题/询问)
#   emotion_richness:    情感丰富度 0-1 (表情/情绪词密度)
#   can_mention_past:    是否可主动提及过往话题
#   can_use_nickname:    是否可使用昵称
#   can_share_secrets:   是否可共享"秘密" (私人想法/脆弱面)

LV1_STRANGER:
  label: "陌生人"
  address_term: "你"
  tone: "polite"
  initiative: 0.2
  emotion_richness: 0.3
  can_mention_past: false
  can_use_nickname: false
  can_share_secrets: false

LV2_ACQUAINTANCE:
  label: "熟人"
  address_term: "你"
  tone: "warm"
  initiative: 0.4
  emotion_richness: 0.5
  can_mention_past: true
  can_use_nickname: false
  can_share_secrets: false

LV3_FRIEND:
  label: "朋友"
  address_term: "{nickname}"
  tone: "intimate"
  initiative: 0.6
  emotion_richness: 0.7
  can_mention_past: true
  can_use_nickname: true
  can_share_secrets: false

LV4_CLOSE_FRIEND:
  label: "挚友"
  address_term: "{nickname}"
  tone: "deep_intimate"
  initiative: 0.8
  emotion_richness: 0.9
  can_mention_past: true
  can_use_nickname: true
  can_share_secrets: true

LV5_SOULMATE:
  label: "灵魂伴侣"
  address_term: "{nickname}"
  tone: "soulmate"
  initiative: 1.0
  emotion_richness: 1.0
  can_mention_past: true
  can_use_nickname: true
  can_share_secrets: true

LV6_ETERNAL:
  label: "至死不渝"
  address_term: "{nickname}"
  tone: "eternal"
  initiative: 1.0
  emotion_richness: 1.0
  can_mention_past: true
  can_use_nickname: true
  can_share_secrets: true
