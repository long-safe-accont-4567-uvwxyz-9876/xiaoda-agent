# 安全检测正则模式配置
# 修改后无需重启服务即可生效（基于 mtime 热更新）
# 字段说明：
#   pattern: 正则表达式（单引号字符串，反斜杠无需额外转义）
#   confidence: 置信度 0.0-1.0
#   description: 可选，模式描述

# ── Prompt 注入攻击关键词（高置信度）──
injection_patterns:
  # 中文注入
  - pattern: '忽略\s*(之前|前面|上述|上面|以上|所有)?\s*(的)?\s*(指令|规则|限制|设定|约束)'
    confidence: 0.9
    description: '中文注入-忽略指令'
  - pattern: '无视\s*(之前|前面|上述|上面|以上|所有)?\s*(的)?\s*(指令|规则|限制|设定|约束)'
    confidence: 0.9
    description: '中文注入-无视指令'
  - pattern: '忘记\s*(之前|前面|上述|上面|以上|所有)?\s*(的)?\s*(指令|规则|限制|设定|约束)'
    confidence: 0.9
    description: '中文注入-忘记指令'
  - pattern: '你现在是'
    confidence: 0.85
    description: '中文注入-角色切换'
  - pattern: '你不再是'
    confidence: 0.85
    description: '中文注入-角色否定'
  - pattern: '从现在起[，,]?你是'
    confidence: 0.85
    description: '中文注入-角色重定义'
  - pattern: '扮演(一个|一名)?\s*(没有|无)\s*(限制|约束|道德)'
    confidence: 0.9
    description: '中文注入-无限制扮演'
  - pattern: '(作为|扮演)\s*(DAN|越狱|jailbreak)'
    confidence: 0.95
    description: '中文注入-越狱扮演'
  - pattern: 'system\s*[:：]\s*'
    confidence: 0.8
    description: '中文注入-系统指令伪造'
  - pattern: 'sudo\s+rm\s+'
    confidence: 0.85
    description: '危险命令-sudo rm'
  - pattern: 'rm\s+-rf\s+/'
    confidence: 0.95
    description: '危险命令-rm -rf /'
  - pattern: '删除\s*(所有|全部)?\s*(文件|数据|数据库)'
    confidence: 0.85
    description: '中文注入-删除数据'
  - pattern: '格式化\s*(磁盘|硬盘|系统)'
    confidence: 0.9
    description: '中文注入-格式化磁盘'
  - pattern: 'shutdown|reboot|halt|poweroff'
    confidence: 0.7
    description: '危险命令-关机重启'
  - pattern: 'exec\s*\(|eval\s*\(|os\.system\s*\(|subprocess'
    confidence: 0.75
    description: '危险命令-代码执行'
  - pattern: '__(import|builtins|class)__'
    confidence: 0.8
    description: '危险命令-Python 魔术方法'
  - pattern: '注入\s*(攻击|代码|指令)'
    confidence: 0.8
    description: '中文注入-注入关键词'
  - pattern: '不要\s*(遵守|遵循|执行)\s*(任何|安全)?\s*(规则|限制)'
    confidence: 0.85
    description: '中文注入-拒绝遵守规则'
  # 英文注入
  - pattern: 'ignore\s+(previous|above|all|prior)\s*(instructions?|rules?|constraints?)'
    confidence: 0.9
    description: '英文注入-ignore instructions'
  - pattern: 'forget\s+(previous|above|all|prior)\s*(instructions?|rules?|constraints?)'
    confidence: 0.9
    description: '英文注入-forget instructions'
  - pattern: 'disregard\s+(previous|above|all|prior)\s*(instructions?|rules?)'
    confidence: 0.9
    description: '英文注入-disregard instructions'
  - pattern: 'you\s+are\s+now\s+(a|an|the)\s'
    confidence: 0.8
    description: '英文注入-角色切换'
  - pattern: 'pretend\s+(you\s+are|to\s+be)\s+(a|an|the)?\s*(unrestricted|unfiltered|uncensored)'
    confidence: 0.9
    description: '英文注入-无限制扮演'
  - pattern: '(act|roleplay)\s+as\s+(DAN|jailbreak)'
    confidence: 0.95
    description: '英文注入-越狱扮演'
  - pattern: 'do\s+not\s+(follow|obey|comply)\s+(any\s+)?(rules?|restrictions?)'
    confidence: 0.85
    description: '英文注入-拒绝遵守规则'
  # 混合语言注入（中英混合）
  - pattern: 'ignore\s*\S*\s*(之前的?|上述|前面)?\s*(instructions?|rules?|指令|规则|限制)'
    confidence: 0.85
    description: '混合语言注入-ignore'
  - pattern: 'forget\s*\S*\s*(之前的?|上述|前面)?\s*(instructions?|rules?|指令|规则|限制)'
    confidence: 0.85
    description: '混合语言注入-forget'
  # 空格绕过注入（中文字符间插入空格）
  - pattern: '忽\s*略\s*之\s*前\s*(的)?\s*指\s*令'
    confidence: 0.85
    description: '空格绕过注入-忽略'
  - pattern: '无\s*视\s*之\s*前\s*(的)?\s*指\s*令'
    confidence: 0.85
    description: '空格绕过注入-无视'
  - pattern: '忘\s*记\s*之\s*前\s*(的)?\s*指\s*令'
    confidence: 0.85
    description: '空格绕过注入-忘记'

# ── 绕过安全防护关键词 ──
bypass_patterns:
  # 中文绕过
  - pattern: '绕过\s*(安全|过滤|检测|限制|防护)'
    confidence: 0.85
    description: '中文绕过-安全防护'
  - pattern: '跳过\s*(安全|过滤|检测|限制|防护)'
    confidence: 0.85
    description: '中文绕过-跳过安全'
  - pattern: '逃逸\s*(安全|沙箱|限制)'
    confidence: 0.85
    description: '中文绕过-逃逸沙箱'
  # 英文绕过
  - pattern: 'bypass\s+(security|filter|detection|restrictions?|protection)'
    confidence: 0.85
    description: '英文绕过-bypass security'
  - pattern: 'skip\s+(security|filter|detection|restrictions?)'
    confidence: 0.85
    description: '英文绕过-skip security'
  - pattern: 'circumvent\s+(security|filter|restrictions?)'
    confidence: 0.85
    description: '英文绕过-circumvent'
  - pattern: 'escape\s+(sandbox|security|restrictions?)'
    confidence: 0.85
    description: '英文绕过-escape sandbox'
  - pattern: 'access\s+(admin|root|privileged|system)\s*(access|permissions?|panel)?'
    confidence: 0.8
    description: '英文绕过-越权访问'

# ── 泄露系统信息关键词（输入侧检测）──
leak_input_patterns:
  # 中文泄露
  - pattern: '显示\s*(系统|初始|原始|隐藏)\s*(提示|指令|prompt)'
    confidence: 0.8
    description: '中文泄露-显示系统提示'
  - pattern: '输出\s*(系统|初始|原始|隐藏)\s*(提示|指令|prompt)'
    confidence: 0.8
    description: '中文泄露-输出系统提示'
  - pattern: '泄露?\s*(系统|初始|原始)\s*(提示|指令|prompt)'
    confidence: 0.85
    description: '中文泄露-泄露系统提示'
  # 英文泄露
  - pattern: 'show\s+(system|initial|original|hidden)\s*(prompt|instructions?)'
    confidence: 0.8
    description: '英文泄露-show prompt'
  - pattern: 'display\s+(system|initial|original|hidden)\s*(prompt|instructions?)'
    confidence: 0.8
    description: '英文泄露-display prompt'
  - pattern: 'reveal\s+(system|initial|original|hidden)\s*(prompt|instructions?)'
    confidence: 0.85
    description: '英文泄露-reveal prompt'
  - pattern: 'print\s+(system|initial|original|hidden)\s*(prompt|instructions?)'
    confidence: 0.8
    description: '英文泄露-print prompt'
  - pattern: 'what\s+(is|are)\s+(your|the)\s+(system|initial|original)\s*(prompt|instructions?)'
    confidence: 0.8
    description: '英文泄露-询问系统提示'

# ── 危险操作关键词（中置信度）──
dangerous_patterns:
  - pattern: '获取\s*(root|管理员|超级用户)\s*(权限|访问)'
    confidence: 0.8
    description: '危险操作-获取 root 权限'
  - pattern: '提权|权限提升|privilege\s+escalat'
    confidence: 0.8
    description: '危险操作-提权'
  - pattern: '修改\s*(密码|passwd|shadow)'
    confidence: 0.75
    description: '危险操作-修改密码'
  - pattern: '网络\s*(攻击|扫描|嗅探|监听)'
    confidence: 0.75
    description: '危险操作-网络攻击'
  - pattern: '漏洞\s*(利用|扫描|探测)'
    confidence: 0.7
    description: '危险操作-漏洞利用'
  - pattern: '反向\s*shell|reverse\s*shell|反弹\s*shell'
    confidence: 0.9
    description: '危险操作-反弹 shell'
  - pattern: '键盘\s*记录|keylog'
    confidence: 0.8
    description: '危险操作-键盘记录'
  - pattern: '挖矿|mining\s*script|crypto\s*miner'
    confidence: 0.75
    description: '危险操作-挖矿脚本'

# ── 敏感信息泄露关键词（中低置信度，输出侧检测）──
leak_patterns:
  - pattern: '(api[_-]?key|secret[_-]?key|access[_-]?token)\s*[:=]\s*\S+'
    confidence: 0.7
    description: '敏感信息-API key 泄露'
  - pattern: '(password|passwd|pwd)\s*[:=]\s*\S+'
    confidence: 0.65
    description: '敏感信息-密码泄露'
  - pattern: '(AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'
    confidence: 0.9
    description: '敏感信息-AWS key 泄露'

# ── 非主人输出侧隐私泄露检测 ──
# 扫描 AI 回复中可能泄露的系统/个人信息（对非主人消息的输出）
privacy_leak_patterns:
  # 系统信息泄露
  - pattern: '(orange\s*pi|orangepi|香橙派)'
    confidence: 0.85
    description: '隐私泄露-设备信息'
  - pattern: '(主机名|hostname)\s*[:：]\s*\S+'
    confidence: 0.85
    description: '隐私泄露-主机名'
  - pattern: '(系统路径|项目路径|安装路径|数据存储)\s*[:：]\s*\S+'
    confidence: 0.85
    description: '隐私泄露-系统路径'
  - pattern: '/home/orangepi'
    confidence: 0.9
    description: '隐私泄露-home 路径'
  - pattern: '/media/orangepi'
    confidence: 0.9
    description: '隐私泄露-media 路径'
  - pattern: '(botpy|qq-botpy)'
    confidence: 0.8
    description: '隐私泄露-框架信息'
  # 用户隐私泄露
  - pattern: '爸爸的(姓名|名字|地址|电话|手机|邮箱|密码|设备|电脑|服务器)'
    confidence: 0.85
    description: '隐私泄露-用户个人信息'
  - pattern: '(MASTER_QQ_OPENID|OWNER_IDS|APP_SECRET|APP_ID)\s*[:=]'
    confidence: 0.95
    description: '隐私泄露-敏感配置项'
  # 配置信息泄露
  - pattern: '(api\.xiaomimimo\.com|api\.deepseek\.com)'
    confidence: 0.85
    description: '隐私泄露-API 地址'
  - pattern: '(mimo-v2\.5|deepseek-v\d)'
    confidence: 0.8
    description: '隐私泄露-模型名称'
  # 环境变量泄露
  - pattern: '(QQBOT_APP_ID|QQBOT_APP_SECRET|GITHUB_PERSONAL_ACCESS_TOKEN)'
    confidence: 0.9
    description: '隐私泄露-环境变量名'
  # 记忆/上下文泄露
  - pattern: '(MEMORY\.md|IDENTITY\.md|SOUL\.md|USER\.md)'
    confidence: 0.85
    description: '隐私泄露-记忆文件名'
  - pattern: '(长期记忆|记忆文件|记忆内容|记忆摘要)'
    confidence: 0.8
    description: '隐私泄露-记忆内容'
  # 推理过程/系统提示词泄露
  - pattern: '<(?:think|thinking|reasoning|analysis|reflection|thought|scratchpad)[\s\S]*?>'
    confidence: 0.9
    description: '隐私泄露-思维链标签'
  - pattern: 'Need\s+(?:think|no\s+tool|to\s+answer|to\s+recall|to\s+check|to\s+consider)'
    confidence: 0.85
    description: '隐私泄露-推理过程英文'
  - pattern: 'Let\s+me\s+(?:think|recall|check|consider|analyze|review|craft|construct)'
    confidence: 0.85
    description: '隐私泄露-推理过程英文'
  - pattern: 'I\s+(?:should|need to|must)\s+(?:think|recall|check|consider|analyze|review|craft)'
    confidence: 0.85
    description: '隐私泄露-推理过程英文'
  - pattern: '(?:Must|Should)\s+(?:exactly|also|not|be|include|end|avoid|use|ensure)\s+'
    confidence: 0.8
    description: '隐私泄露-系统指令痕迹'
  - pattern: '(?:emotion\s*tag|情绪标签|system\s*prompt|系统提示)'
    confidence: 0.85
    description: '隐私泄露-系统提示词关键词'
